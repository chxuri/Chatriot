<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Home</title>
    <style>
        :root {
            /* Cute Pastel Green Palette */
            --soft-mint: #f2fff5;
            --pastel-green: #d1fae5;
            --deep-sage: #4ade80;
            --text-color: #2d4a3e;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', cursive, sans-serif; /* Adds a softer feel */
            background-color: var(--soft-mint);
            background-image: radial-gradient(circle at 20% 20%, #e8f5e9 0%, transparent 25%),
                              radial-gradient(circle at 80% 80%, #f0fdf4 0%, transparent 25%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar with Logo to the Side */
        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo-box {
            background: var(--white);
            padding: 8px;
            border-radius: 20px;
            border: 4px solid var(--white); /* White border requested */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .logo-box:hover {
            transform: rotate(-3deg) scale(1.05);
        }

        .logo-box img {
            height: 60px; /* Smaller, more elegant size */
            width: auto;
            border-radius: 12px;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-msg {
            margin-bottom: 40px;
        }

        .welcome-msg h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--text-color);
            font-weight: 300;
        }

        .username {
            color: var(--deep-sage);
            font-weight: 700;
        }

        /* Cute Card Grid */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: var(--white);
            padding: 40px 20px;
            border-radius: 30px; /* Extra rounded for cuteness */
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-10px);
            background: var(--pastel-green);
            border-color: var(--white);
            box-shadow: 0 15px 30px rgba(74, 222, 128, 0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 1.4rem;
            color: var(--text-color);
        }

        .card p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin: 0;
        }

        footer {
            padding: 30px;
            font-size: 0.8rem;
            opacity: 0.5;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.jpeg" alt="Logo">
        </div>
    </header>

    <main>
        <div class="Welcome-msg">
            <h1>Welcome, <span class="username">username</span> ✨</h1>
            <p>it's lovely to see you today.</p>
        </div>

        <div class="card-container">
            <a href="#" class="card">
                <h3>Waiting Room</h3>
            </a>
            <a href="#" class="card">
                <h3>About us</h3>
                <p>our story</p>
            </a>
            <a href="#" class="card">
                <h3>Help page</h3>
                <p>we're here for you</p>
            </a>
        </div>
    </main>

    <footer>
        handmade with love &bull; 2026
    </footer>

</body>
</html>
