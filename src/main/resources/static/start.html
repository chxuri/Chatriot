<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="waiting_page_style.css">
    <title>first document</title>
</head>
<body>
    <header>
        <div class="logo-box">
            <a href="index.html">
                <img src="https://i.imgur.com/SPQmgVJ.png" alt="Logo"></img>
            </a>
        </div>
    </header>
    
    <div id="chat-container" style="display: none;">
        <button class="back-button" onClick="backToWaitingPage()">Exit Class</button>
        <h1 id="chat-head">Live Chat</h1>

        <div id="messages"></div>
        <div id="chat">
            <input id="messageInput" type="text" placeHolder="Type a message!" />
            <button type="button" class="button" onclick="sendMessage()">Send</button> 
        </div>
    </div>

    <div id="waiting-room" style="display: block;">
        <div id="heading-box">
            <h1>Select your class:</h1>
            <p>Make sure to select a period!</p>
        </div>
        <div class="classroom-list">
            <table id="classroom-table">
                <tr>
                    <th>Subject:</th>
                    <th>Teacher:</th>
                    <th>Period:</th>
                    <th>Go To:</th>
                </tr>
                <tbody id="classroom-table-info">
                    <!-- gets filled with js fetch func-->
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        made by Team Chatriot :&#41
    </footer>
    
    <script src="chat.js"></script>
</body>
<script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            // Not signed in, send back to login
            window.location.href = "index.html";
        } else {
            // Update username display if it exists
            const display = document.getElementById("username-display");
            if (display) display.textContent = user.displayName;
        }
    });
</script>
</html>
