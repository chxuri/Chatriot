<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="waiting_page_style.css">
    <title>first document</title>
</head>
<body>
    
    <div id="chat-container" style="display: none;">
        <h2 style = "font-size: 35px; color: #1b512d">Live Chat</h2>

        <div id="messages"></div>
        <div id="chat">
            <input id="messageInput" type="text" placeHolder="Type a message!" />
            <button type="button" class="button" onclick="sendMessage()">Send</button> 
        </div>
    </div>

    <div id="waiting-room" style="display: block;">
        <div id="heading-box">
            <h1>Select your class:</h1>
            <p>Make sure to select a period!</p>
        </div>
        <div class="classroom-list">
            <table id="classroom-table">
                <tr>
                    <th>Subject:</th>
                    <th>Teacher:</th>
                    <th>Period:</th>
                    <th>Go To:</th>
                </tr>
                <tbody id="classroom-table-info">
                    <!-- gets filled with js fetch func-->
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        made by Team Chatriot :&#41
    </footer>
    
    <script src="chat.js"></script>
</body>
</html>
