
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Page</title>
    <style>
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: lightgreen;
        }
        ::-webkit-scrollbar-thumb {
            background: green;
        }
        ::-webkit-scrollbar-thum:hover {
            background: darkgreen;
        }
        .classroom-list {
            width: 300px;
            height: 150px;
            border: 1px solid lightgray;
            margin: 20px;
            overflow-y: scroll;
            padding: 10px;
        }
        
    </style>
</head>
<body>
    <h1>Select your class:</h1>
    <div class="classroom-list">
        <p>Classroom buttons will go here</p>
        <table id="classroom-table">
            <tr>
                <th>Subject</th>
                <th>Teacher</th>
                <th>Period</th>
                <th>Go To</th>
            </tr>
            <tbody id="classroom-table-info">
                <!-- gets filled with js fetch func-->
            </tbody>
        </table>
    </div>
    <script src="chat.js"></script>
</body>
</html>
