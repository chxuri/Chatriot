<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Welcome Home</title>
    <style>
        :root {
            --soft-mint: #cee9d3;
            --pastel-green: #e7f8ef;
            --deep-sage: #56906b;
            --text-color: #2d4a3e;
            --white: #ffffff;
        }

        

       

        

        
      
       
        
    </style>

    
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://i.imgur.com/SPQmgVJ.png" alt="Logo"></img>
        </div>
    </header>

    <main>
        <div class="Welcome-msg">
            <!-- added id so JS can update it -->
            <h1>Welcome, <span class="username" id="username-display">...</span></h1>
            <p>it's lovely to see you today.</p>
        </div>

        <div class="card-container">
            <a href="start.html" class="card">
                <h3>Waiting Room</h3>
            </a>
            <a href="about-us.html" class="card">
                <h3>About us</h3>
                <p>our story</p>
            </a>
            <a href="help.html" class="card">
                <h3>Help page</h3>
                <p>we're here for you</p>
            </a>
        </div>
    </main>

    <footer>
        made by Team Chatriot :&#41;
    </footer>

    <!-- add these two scripts at the bottom -->
    <script type="module" src="auth.js"></script>
    <script>
        // displays the signed in user's name
        const userName = sessionStorage.getItem("userName");
        if (userName) {
            document.getElementById("username-display").textContent = userName;
        }
    </script>
</body>
<script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            // Not signed in, send back to login
            window.location.href = "index.html";
        } else {
            // Update username display if it exists
            const display = document.getElementById("username-display");
            if (display) display.textContent = user.displayName;
        }
    });
</script>
</html>
